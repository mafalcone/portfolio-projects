name: Portfolio Healthcheck

on:
  push:
    branches: [main, portfolio-audit-fixes-2026-06-25]
  pull_request:
    branches: [main]

jobs:
  frontend-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm ci
        working-directory: taskpulse_frontend
      - run: npm run build
        working-directory: taskpulse_frontend

  python-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: python -m compileall nutrition_analyzer_py/app log_monitor_py/app
